nxos:
  interface_groups:
    - name: FABRIC_INTERFACE
      configuration:
        switchport:
          enabled: false
        medium: p2p
        ip:
          unnumbered: lo0
        ospf:
          process: "1"
          area: 0.0.0.0
          network: p2p
        pim:
          sparse_mode: true

    - name: LOOPBACK_INTERFACE
      configuration:
        ospf:
          process: "1"
          area: 0.0.0.0
          network: p2p
        pim:
          sparse_mode: true
